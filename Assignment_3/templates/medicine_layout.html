<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Medicine Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='medicine.css') }}">
</head>
<body>
    <header class="topbar">
        <a class="brand" href="{{ url_for('medicines') }}">Smart Medical Box</a>
        <nav>
            <a href="{{ url_for('medicines') }}">Medicines</a>
            <a href="{{ url_for('search') }}">Search openFDA</a>
            <a href="/health">Health</a>
        </nav>
    </header>

    <main class="page">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <section class="messages" aria-live="polite">
                    {% for category, message in messages %}
                        <div class="message {{ category }}">{{ message }}</div>
                    {% endfor %}
                </section>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
